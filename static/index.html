<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BA Cylinder Dashboard</title>
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --good:           #0ca30c;
    --warning:        #fab219;
    --critical:       #d03b3b;
    --accent:         #2a78d6;
    --accent-ink:     #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --good:           #0ca30c;
      --warning:        #fab219;
      --critical:       #e66767;
      --accent:         #3987e5;
      --accent-ink:     #0b0b0b;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
  }
  header {
    padding: 24px 32px 8px;
  }
  header h1 { font-size: 20px; margin: 0 0 2px; }
  header p { margin: 0; color: var(--text-secondary); font-size: 13px; }
  main { padding: 20px 32px 48px; max-width: 1300px; margin: 0 auto; }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-tile {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-tile .label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .stat-tile .label .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .stat-tile.status-good .label .dot { background: var(--good); }
  .stat-tile.status-warning .label .dot { background: var(--warning); }
  .stat-tile.status-critical .label .dot { background: var(--critical); }
  .stat-tile .value {
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    color: var(--text-primary);
  }

  .tab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--gridline);
  }
  .tab-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 4px;
    margin-bottom: -1px;
  }
  .tab-btn.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent);
  }
  .tab-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    margin-left: 6px;
    border-radius: 999px;
    background: var(--critical);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
  }
  .tab-count[hidden] { display: none; }

  .view[hidden] { display: none; }

  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }
  .toolbar input[type="search"] {
    flex: 1;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface-1);
    color: var(--text-primary);
    font-size: 14px;
  }
  button {
    font: inherit;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }
  .btn-secondary {
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 16px;
    font-size: 14px;
    white-space: nowrap;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }

  .table-scroll {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  table {
    width: 100%;
    min-width: 900px;
    border-collapse: collapse;
    background: var(--surface-1);
    font-size: 14px;
  }
  thead th {
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    padding: 10px 14px;
    border-bottom: 1px solid var(--gridline);
  }
  tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--gridline);
    color: var(--text-primary);
  }
  tbody tr:last-child td { border-bottom: none; }
  td.mono, .mono { font-variant-numeric: tabular-nums; }
  td.serial { font-weight: 600; }

  thead th.sortable {
    cursor: pointer;
    user-select: none;
  }
  thead th.sortable:hover { color: var(--text-secondary); }
  .sort-arrow { display: inline-block; width: 8px; font-size: 10px; color: var(--text-primary); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge {
    color: var(--text-secondary);
    background: color-mix(in srgb, var(--text-primary) 6%, transparent);
  }
  .badge.status-good .dot { background: var(--good); }
  .badge.status-warning .dot { background: var(--warning); }
  .badge.status-critical .dot { background: var(--critical); }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }

  .row-edit {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .row-edit:hover { color: var(--text-primary); border-color: var(--text-secondary); }

  .row-actions { display: flex; gap: 8px; }
  .btn-accept, .btn-reject {
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 13px;
    border: 1px solid var(--border);
    background: transparent;
  }
  .btn-accept { color: var(--good); }
  .btn-reject { color: var(--critical); }
  .btn-accept:hover { background: color-mix(in srgb, var(--good) 12%, transparent); }
  .btn-reject:hover { background: color-mix(in srgb, var(--critical) 12%, transparent); }

  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal-backdrop[hidden] { display: none; }
  .modal {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
  }
  .modal h2 { margin: 0 0 16px; font-size: 16px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    padding: 9px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--page);
    color: var(--text-primary);
    font-size: 14px;
  }
  .field input:read-only { color: var(--text-muted); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
  }
  .form-error {
    color: var(--critical);
    font-size: 13px;
    margin: -6px 0 14px;
    min-height: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>BA Cylinder Dashboard</h1>
  <p>Breathing apparatus cylinder register</p>
</header>

<main>
  <div class="tab-row">
    <button class="tab-btn active" id="tabCylinders" data-view="cylinders">Cylinders</button>
    <button class="tab-btn" id="tabPending" data-view="pending">Pending Requests <span class="tab-count" id="pendingCount" hidden>0</span></button>
  </div>

  <section class="view" id="cylindersView">
    <section class="kpi-row" id="kpiRow"></section>

    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="Search by serial, appliance, or status…">
      <a class="btn-secondary" id="exportBtn" href="/export">Export to Excel</a>
      <button class="btn-primary" id="addBtn">+ Add cylinder</button>
    </div>

    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Serial</th>
            <th class="sortable" data-sort-key="location">Appliance <span class="sort-arrow" data-arrow-for="location"></span></th>
            <th class="sortable" data-sort-key="manufacture_date">Manufacture date <span class="sort-arrow" data-arrow-for="manufacture_date"></span></th>
            <th class="sortable" data-sort-key="next_hydrostatic_date">Next hydrostatic test <span class="sort-arrow" data-arrow-for="next_hydrostatic_date"></span></th>
            <th class="sortable" data-sort-key="last_servicing_date">Last servicing date <span class="sort-arrow" data-arrow-for="last_servicing_date"></span></th>
            <th class="sortable" data-sort-key="date_of_expiry">Date of expiry <span class="sort-arrow" data-arrow-for="date_of_expiry"></span></th>
            <th>Remarks</th>
            <th class="sortable" data-sort-key="status">Status <span class="sort-arrow" data-arrow-for="status"></span></th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="empty" id="emptyState" hidden>No cylinders match your search.</div>
  </section>

  <section class="view" id="pendingView" hidden>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Serial</th>
            <th>Requested appliance</th>
            <th>Remarks</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="pendingBody"></tbody>
      </table>
    </div>
    <div class="empty" id="pendingEmptyState" hidden>No pending requests.</div>
  </section>
</main>

<div class="modal-backdrop" id="modalBackdrop" hidden>
  <div class="modal">
    <h2 id="modalTitle">Add cylinder</h2>
    <form id="cylinderForm">
      <div class="field">
        <label for="f-serial">Serial</label>
        <input id="f-serial" name="serial" required>
      </div>
      <div class="field">
        <label for="f-location">Appliance</label>
        <input id="f-location" name="location" required>
      </div>
      <div class="field">
        <label for="f-manufacture">Manufacture date</label>
        <input id="f-manufacture" name="manufacture_date" type="date" required>
      </div>
      <div class="field">
        <label for="f-hydro">Next hydrostatic test</label>
        <input id="f-hydro" name="next_hydrostatic_date" type="date" required>
      </div>
      <div class="field">
        <label for="f-service">Last servicing date</label>
        <input id="f-service" name="last_servicing_date" type="date" required>
      </div>
      <div class="field">
        <label for="f-expiry">Date of expiry</label>
        <input id="f-expiry" name="date_of_expiry" type="date" required>
      </div>
      <div class="field">
        <label for="f-remarks">Remarks</label>
        <input id="f-remarks" name="remarks">
      </div>
      <div class="form-error" id="formError"></div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn-primary" id="submitBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
const DUE_SOON_DAYS = 90;
const STATUS_RANK = { critical: 0, warning: 1, good: 2 };
const APPLIANCE_ORDER = ['PL231', 'PL232', 'LF231E', 'CPL231', 'OST231', 'HSV231', 'FP231', 'FT231', 'Store Spares'];
const DATE_COLUMNS = new Set(['manufacture_date', 'next_hydrostatic_date', 'last_servicing_date', 'date_of_expiry']);

let cylinders = [];
let editingSerial = null; // null = add mode
let sortKey = null;   // null = unsorted, else one of: status, location, or a date column
let sortDir = null;   // 'asc' | 'desc'

const tableBody = document.getElementById('tableBody');
const kpiRow = document.getElementById('kpiRow');
const emptyState = document.getElementById('emptyState');
const searchInput = document.getElementById('searchInput');
const modalBackdrop = document.getElementById('modalBackdrop');
const modalTitle = document.getElementById('modalTitle');
const cylinderForm = document.getElementById('cylinderForm');
const formError = document.getElementById('formError');
const serialField = document.getElementById('f-serial');
const sortableHeaders = document.querySelectorAll('th.sortable');
const pendingBody = document.getElementById('pendingBody');
const pendingEmptyState = document.getElementById('pendingEmptyState');
const pendingCount = document.getElementById('pendingCount');
const tabCylinders = document.getElementById('tabCylinders');
const tabPending = document.getElementById('tabPending');
const cylindersView = document.getElementById('cylindersView');
const pendingView = document.getElementById('pendingView');

function daysUntil(dateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(dateStr);
  return Math.round((target - today) / 86400000);
}

function statusOf(cylinder) {
  const days = daysUntil(cylinder.next_hydrostatic_date);
  if (days < 0) return 'critical';
  if (days <= DUE_SOON_DAYS) return 'warning';
  return 'good';
}

function statusLabel(status) {
  return { good: 'OK', warning: 'Due soon', critical: 'Overdue' }[status];
}

function badgeHtml(status) {
  return `<span class="badge status-${status}"><span class="dot"></span>${statusLabel(status)}</span>`;
}

function applianceRank(location) {
  const idx = APPLIANCE_ORDER.indexOf(location);
  return idx === -1 ? APPLIANCE_ORDER.length : idx;
}

function sortValueOf(cylinder, key) {
  if (key === 'status') return STATUS_RANK[statusOf(cylinder)];
  if (key === 'location') return applianceRank(cylinder.location);
  if (DATE_COLUMNS.has(key)) return cylinder[key] || ''; // ISO dates sort correctly as strings
  return '';
}

async function loadCylinders() {
  const res = await fetch('/api/cylinder');
  cylinders = await res.json();
  render();
}

async function loadPending() {
  const res = await fetch('/api/pending');
  const pending = await res.json();

  pendingCount.textContent = pending.length;
  pendingCount.hidden = pending.length === 0;

  pendingBody.innerHTML = pending.map(p => `
    <tr>
      <td class="serial">${escapeHtml(p.serial)}</td>
      <td>${escapeHtml(p.location)}</td>
      <td>${escapeHtml(p.remarks) || '—'}</td>
      <td>
        <div class="row-actions">
          <button class="btn-accept" data-serial="${escapeHtml(p.serial)}" data-action="accept">Accept</button>
          <button class="btn-reject" data-serial="${escapeHtml(p.serial)}" data-action="reject">Reject</button>
        </div>
      </td>
    </tr>
  `).join('');

  pendingEmptyState.hidden = pending.length !== 0;
}

function switchView(view) {
  const showPending = view === 'pending';
  cylindersView.hidden = showPending;
  pendingView.hidden = !showPending;
  tabCylinders.classList.toggle('active', !showPending);
  tabPending.classList.toggle('active', showPending);
  if (showPending) loadPending();
}

function render() {
  const query = searchInput.value.trim().toLowerCase();
  const filtered = cylinders.filter(c =>
    c.serial.toLowerCase().includes(query) ||
    c.location.toLowerCase().includes(query) ||
    statusLabel(statusOf(c)).toLowerCase().includes(query)
  );

  if (sortKey) {
    const sign = sortDir === 'asc' ? 1 : -1;
    filtered.sort((a, b) => {
      const va = sortValueOf(a, sortKey);
      const vb = sortValueOf(b, sortKey);
      if (va < vb) return -sign;
      if (va > vb) return sign;
      return 0;
    });
  }

  sortableHeaders.forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (th.dataset.sortKey === sortKey) {
      arrow.textContent = sortDir === 'asc' ? '↑' : '↓';
    } else {
      arrow.textContent = '';
    }
  });

  const counts = { good: 0, warning: 0, critical: 0 };
  for (const c of cylinders) counts[statusOf(c)]++;

  kpiRow.innerHTML = `
    <div class="stat-tile">
      <div class="label">Total cylinders</div>
      <div class="value">${cylinders.length}</div>
    </div>
    <div class="stat-tile status-good">
      <div class="label">OK</div>
      <div class="value">${counts.good}</div>
    </div>
    <div class="stat-tile status-warning">
      <div class="label">Due within ${DUE_SOON_DAYS} days</div>
      <div class="value">${counts.warning}</div>
    </div>
    <div class="stat-tile status-critical">
      <div class="label">Overdue</div>
      <div class="value">${counts.critical}</div>
    </div>
  `;

  tableBody.innerHTML = filtered.map(c => {
    const status = statusOf(c);
    return `
      <tr>
        <td class="serial">${escapeHtml(c.serial)}</td>
        <td>${escapeHtml(c.location)}</td>
        <td class="mono">${escapeHtml(c.manufacture_date) || '—'}</td>
        <td class="mono">${escapeHtml(c.next_hydrostatic_date) || '—'}</td>
        <td class="mono">${escapeHtml(c.last_servicing_date) || '—'}</td>
        <td class="mono">${escapeHtml(c.date_of_expiry) || '—'}</td>
        <td>${escapeHtml(c.remarks) || '—'}</td>
        <td>${badgeHtml(status)}</td>
        <td><button class="row-edit" data-serial="${escapeHtml(c.serial)}">Edit</button></td>
      </tr>
    `;
  }).join('');

  emptyState.hidden = filtered.length !== 0;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}

function openModal(mode, cylinder) {
  formError.textContent = '';
  cylinderForm.reset();
  if (mode === 'edit') {
    editingSerial = cylinder.serial;
    modalTitle.textContent = `Edit ${cylinder.serial}`;
    serialField.value = cylinder.serial;
    serialField.readOnly = true;
    document.getElementById('f-location').value = cylinder.location;
    document.getElementById('f-manufacture').value = cylinder.manufacture_date;
    document.getElementById('f-hydro').value = cylinder.next_hydrostatic_date;
    document.getElementById('f-service').value = cylinder.last_servicing_date || '';
    document.getElementById('f-expiry').value = cylinder.date_of_expiry || '';
    document.getElementById('f-remarks').value = cylinder.remarks || '';
  } else {
    editingSerial = null;
    modalTitle.textContent = 'Add cylinder';
    serialField.readOnly = false;
  }
  modalBackdrop.hidden = false;
  serialField.focus();
}

function closeModal() {
  modalBackdrop.hidden = true;
}

document.getElementById('addBtn').addEventListener('click', () => openModal('add'));
document.getElementById('cancelBtn').addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', (e) => { if (e.target === modalBackdrop) closeModal(); });
searchInput.addEventListener('input', render);

sortableHeaders.forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sortKey;
    sortDir = (sortKey === key && sortDir === 'asc') ? 'desc' : 'asc';
    sortKey = key;
    render();
  });
});

tableBody.addEventListener('click', (e) => {
  const btn = e.target.closest('.row-edit');
  if (!btn) return;
  const cylinder = cylinders.find(c => c.serial === btn.dataset.serial);
  if (cylinder) openModal('edit', cylinder);
});

tabCylinders.addEventListener('click', () => switchView('cylinders'));
tabPending.addEventListener('click', () => switchView('pending'));

pendingBody.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  btn.disabled = true;
  const accepted = btn.dataset.action === 'accept';
  try {
    const res = await fetch(`/api/accept/${encodeURIComponent(btn.dataset.serial)}?status=${accepted}`, {
      method: 'POST',
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Request failed (${res.status})`);
    }
    await loadPending();
    if (accepted) await loadCylinders(); // location may have changed
  } catch (err) {
    alert(err.message);
    btn.disabled = false;
  }
});

cylinderForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  formError.textContent = '';
  const data = Object.fromEntries(new FormData(cylinderForm).entries());

  try {
    let res;
    if (editingSerial) {
      res = await fetch(`/api/cylinder/${encodeURIComponent(editingSerial)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          location: data.location,
          manufacture_date: data.manufacture_date,
          next_hydrostatic_date: data.next_hydrostatic_date,
          last_servicing_date: data.last_servicing_date,
          date_of_expiry: data.date_of_expiry,
          remarks: data.remarks,
        }),
      });
    } else {
      res = await fetch('/api/cylinder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Request failed (${res.status})`);
    }
    closeModal();
    await loadCylinders();
  } catch (err) {
    formError.textContent = err.message;
  }
});

loadCylinders();
loadPending(); // populates the tab badge even before the tab is opened
</script>
</body>
</html>
